<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Undercover Manga</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  background: #0a0a1a;
  color: #e0e0e0;
  min-height: 100vh;
  overflow-x: hidden;
}

.bg-particles {
  position: fixed; top:0; left:0; width:100%; height:100%;
  background:
    radial-gradient(ellipse at 20% 50%, rgba(120,40,200,0.15) 0%, transparent 60%),
    radial-gradient(ellipse at 80% 20%, rgba(255,50,80,0.1) 0%, transparent 50%),
    radial-gradient(ellipse at 50% 80%, rgba(0,150,255,0.1) 0%, transparent 50%);
  z-index: 0;
}

.container {
  position: relative; z-index: 1;
  max-width: 900px; margin: 0 auto; padding: 20px;
}

h1 {
  text-align: center; font-size: 2.8rem; margin: 20px 0 5px;
  background: linear-gradient(135deg, #ff6b6b, #ffa500, #ffdd57, #48dbfb, #ff6bb5);
  background-size: 300% 300%;
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
  animation: gradient-shift 4s ease infinite;
}

@keyframes gradient-shift {
  0%,100% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
}

.subtitle {
  text-align: center; color: #888; font-size: 1rem; margin-bottom: 30px;
}

/* ── Setup Screen ── */
.setup-panel {
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 16px; padding: 30px; margin-bottom: 20px;
  backdrop-filter: blur(10px);
}

.setup-panel h2 {
  font-size: 1.3rem; margin-bottom: 20px; color: #ccc;
  display: flex; align-items: center; gap: 10px;
}

.setup-row {
  display: flex; gap: 15px; align-items: center; margin-bottom: 15px; flex-wrap: wrap;
}

.setup-row label {
  font-size: 0.95rem; color: #aaa; min-width: 160px;
}

.setup-row input, .setup-row select {
  background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.15);
  border-radius: 8px; padding: 10px 14px; color: #fff; font-size: 1rem;
  outline: none; transition: border-color 0.2s;
}

.setup-row input:focus, .setup-row select:focus {
  border-color: #ff6b6b;
}

.setup-row select option { background: #1a1a2e; }

.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 8px;
  padding: 12px 28px; border: none; border-radius: 10px;
  font-size: 1rem; font-weight: 600; cursor: pointer;
  transition: all 0.2s; text-transform: uppercase; letter-spacing: 0.5px;
}

.btn-primary {
  background: linear-gradient(135deg, #ff6b6b, #ee5a24);
  color: #fff; box-shadow: 0 4px 15px rgba(238,90,36,0.3);
}
.btn-primary:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(238,90,36,0.4); }

.btn-secondary {
  background: rgba(255,255,255,0.08); color: #ccc;
  border: 1px solid rgba(255,255,255,0.15);
}
.btn-secondary:hover { background: rgba(255,255,255,0.12); }

.btn-danger {
  background: linear-gradient(135deg, #c0392b, #96281b);
  color: #fff;
}

.btn-success {
  background: linear-gradient(135deg, #27ae60, #1e8449);
  color: #fff;
}

.btn-center { display: flex; justify-content: center; gap: 12px; margin-top: 20px; }

/* ── Game Screen ── */
.game-header {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 20px; flex-wrap: wrap; gap: 10px;
}

.round-badge {
  background: rgba(255,107,107,0.15); border: 1px solid rgba(255,107,107,0.3);
  padding: 6px 16px; border-radius: 20px; font-size: 0.9rem; color: #ff6b6b;
}

.phase-label {
  font-size: 1.1rem; font-weight: 600; color: #ffdd57;
}

/* Player cards */
.players-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
  gap: 12px; margin-bottom: 25px;
}

.player-card {
  background: rgba(255,255,255,0.04);
  border: 2px solid rgba(255,255,255,0.08);
  border-radius: 14px; padding: 14px 10px;
  text-align: center; cursor: pointer;
  transition: all 0.25s;
  position: relative; overflow: hidden;
}

.player-card:hover:not(.eliminated):not(.disabled) {
  border-color: rgba(255,107,107,0.5);
  transform: translateY(-3px);
  box-shadow: 0 8px 25px rgba(0,0,0,0.3);
}

.player-card.selected {
  border-color: #ff6b6b;
  background: rgba(255,107,107,0.1);
  box-shadow: 0 0 20px rgba(255,107,107,0.2);
}

.player-card.eliminated {
  opacity: 0.35;
  filter: grayscale(1);
  cursor: default;
  border-style: dashed;
}

.player-card .avatar {
  width: 70px; height: 70px; border-radius: 50%;
  margin: 0 auto 8px; border: 2px solid rgba(255,255,255,0.15);
  overflow: hidden;
}

.player-card .avatar img {
  width: 100%; height: 100%; object-fit: cover;
}

.player-card .pname {
  font-size: 0.85rem; font-weight: 600;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}

.player-card .role-tag {
  display: inline-block; margin-top: 5px;
  padding: 2px 8px; border-radius: 6px;
  font-size: 0.7rem; font-weight: 600; text-transform: uppercase;
}

.role-civil { background: rgba(46,204,113,0.2); color: #2ecc71; }
.role-undercover { background: rgba(231,76,60,0.2); color: #e74c3c; }
.role-mrwhite { background: rgba(255,255,255,0.2); color: #fff; }

/* Role reveal overlay */
.role-reveal {
  position: fixed; top:0; left:0; width:100%; height:100%;
  background: rgba(0,0,0,0.92); z-index: 100;
  display: flex; align-items: center; justify-content: center;
  backdrop-filter: blur(8px);
  animation: fadeIn 0.3s;
}

@keyframes fadeIn { from { opacity:0; } to { opacity:1; } }

.role-card {
  background: linear-gradient(145deg, #1a1a2e, #16213e);
  border: 2px solid rgba(255,255,255,0.1);
  border-radius: 20px; padding: 40px; text-align: center;
  max-width: 380px; width: 90%;
  box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  animation: slideUp 0.4s ease;
}

@keyframes slideUp { from { opacity:0; transform:translateY(30px); } to { opacity:1; transform:translateY(0); } }

.role-card .char-img {
  width: 140px; height: 140px; border-radius: 16px;
  margin: 0 auto 15px; border: 3px solid rgba(255,255,255,0.15);
  overflow: hidden;
  box-shadow: 0 8px 30px rgba(0,0,0,0.4);
}

.role-card .char-img img { width:100%; height:100%; object-fit:cover; }

.role-card .player-label {
  font-size: 0.85rem; color: #888; margin-bottom: 5px;
}

.role-card .char-name {
  font-size: 1.8rem; font-weight: 700; margin: 10px 0;
}

.role-card .universe-tag {
  font-size: 0.8rem; color: #888; margin-bottom: 15px;
}

.role-card .hidden-msg {
  font-size: 1.2rem; color: #aaa;
}

/* Vote area */
.vote-area {
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 14px; padding: 20px; margin-top: 15px;
}

.vote-area h3 { margin-bottom: 12px; color: #ccc; font-size: 1rem; }

.vote-results {
  display: flex; flex-direction: column; gap: 6px;
}

.vote-bar-row {
  display: flex; align-items: center; gap: 10px;
}

.vote-bar-row .vname { min-width: 80px; font-size: 0.85rem; }

.vote-bar {
  flex: 1; height: 24px; background: rgba(255,255,255,0.05);
  border-radius: 6px; overflow: hidden; position: relative;
}

.vote-bar-fill {
  height: 100%; border-radius: 6px;
  background: linear-gradient(90deg, #ff6b6b, #ee5a24);
  transition: width 0.5s ease;
  min-width: 0;
}

.vote-bar-count {
  font-size: 0.8rem; color: #aaa; min-width: 30px; text-align: right;
}

/* Result overlay */
.result-overlay {
  position: fixed; top:0; left:0; width:100%; height:100%;
  background: rgba(0,0,0,0.9); z-index: 200;
  display: flex; align-items: center; justify-content: center;
  backdrop-filter: blur(8px);
}

.result-box {
  background: linear-gradient(145deg, #1a1a2e, #16213e);
  border-radius: 20px; padding: 40px; text-align: center;
  max-width: 500px; width: 90%;
  border: 2px solid rgba(255,255,255,0.1);
  animation: slideUp 0.4s ease;
}

.result-box h2 {
  font-size: 2rem; margin-bottom: 15px;
}

.result-box .winner-civil { color: #2ecc71; }
.result-box .winner-undercover { color: #e74c3c; }
.result-box .winner-mrwhite { color: #f1c40f; }

.result-box .pair-reveal {
  margin: 20px 0; display: flex; justify-content: center; gap: 30px;
}

.result-box .pair-char {
  text-align: center;
}

.result-box .pair-char img {
  width: 100px; height: 100px; border-radius: 12px;
  border: 2px solid rgba(255,255,255,0.2);
  margin-bottom: 8px;
}

.result-box .pair-char .pc-name { font-size: 0.9rem; font-weight: 600; }
.result-box .pair-char .pc-role { font-size: 0.75rem; color: #888; }

/* Instructions box */
.instructions {
  background: rgba(255,221,87,0.05);
  border: 1px solid rgba(255,221,87,0.15);
  border-radius: 12px; padding: 16px 20px; margin-bottom: 20px;
  font-size: 0.9rem; color: #ccc; line-height: 1.6;
}

.instructions strong { color: #ffdd57; }

/* Mr. White guess */
.guess-overlay {
  position: fixed; top:0; left:0; width:100%; height:100%;
  background: rgba(0,0,0,0.92); z-index: 150;
  display: flex; align-items: center; justify-content: center;
}

.guess-box {
  background: linear-gradient(145deg, #1a1a2e, #16213e);
  border: 2px solid rgba(255,255,255,0.1);
  border-radius: 20px; padding: 40px; text-align: center;
  max-width: 400px; width: 90%;
}

.guess-box input {
  background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.2);
  border-radius: 10px; padding: 12px 16px; color: #fff; font-size: 1.1rem;
  width: 100%; margin: 15px 0; text-align: center; outline: none;
}

.guess-box input:focus { border-color: #f1c40f; }

/* Responsive */
@media (max-width: 600px) {
  h1 { font-size: 2rem; }
  .players-grid { grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 8px; }
  .player-card { padding: 10px 6px; }
  .player-card .avatar { width: 55px; height: 55px; }
  .role-card { padding: 25px; }
  .role-card .char-img { width: 110px; height: 110px; }
}


/* Voter indicator */
.voter-indicator {
  background: rgba(255,221,87,0.1); border: 1px solid rgba(255,221,87,0.3);
  border-radius: 10px; padding: 12px 20px; margin-bottom: 15px;
  text-align: center; font-size: 1rem; color: #ffdd57;
  animation: pulse-border 1.5s ease infinite;
}

@keyframes pulse-border {
  0%,100% { border-color: rgba(255,221,87,0.3); }
  50% { border-color: rgba(255,221,87,0.7); }
}

.player-card.voting-highlight {
  border-color: #ffdd57 !important;
  box-shadow: 0 0 15px rgba(255,221,87,0.3);
}

/* Elimination banner */
.elimination-banner {
  background: rgba(231,76,60,0.1); border: 1px solid rgba(231,76,60,0.3);
  border-radius: 14px; padding: 20px; margin-bottom: 20px;
  text-align: center;
  animation: slideUp 0.4s ease;
}

.elimination-banner .elim-avatar {
  width: 80px; height: 80px; border-radius: 50%; margin: 0 auto 10px;
  border: 3px solid rgba(231,76,60,0.5); overflow: hidden;
  filter: grayscale(0.5);
}

.elimination-banner .elim-avatar img {
  width: 100%; height: 100%; object-fit: cover;
}

.elimination-banner .elim-name {
  font-size: 1.2rem; font-weight: 700; color: #e74c3c;
}

.elimination-banner .elim-role {
  font-size: 0.85rem; color: #aaa; margin-top: 4px;
}

/* Hidden utility */
.hidden { display: none !important; }
</style>
</head>

<div class="bg-particles"></div>
<div class="container">
  <h1>UNDERCOVER MANGA</h1>
  <p class="subtitle">Le jeu d&rsquo;infiltration version anime</p>

  <!-- ════ SETUP SCREEN ════ -->
  <div id="setup-screen">
    <div class="setup-panel">
      <h2>Configuration de la partie</h2>
      <div class="setup-row">
        <label for="nb-players">Nombre de joueurs</label>
        <input type="number" id="nb-players" min="3" max="20" value="6">
      </div>
      <div class="setup-row">
        <label for="nb-undercover">Nombre d&rsquo;Undercover</label>
        <input type="number" id="nb-undercover" min="1" max="5" value="1">
      </div>
      <div class="setup-row">
        <label for="nb-mrwhite">Nombre de Mr. White</label>
        <input type="number" id="nb-mrwhite" min="0" max="3" value="0">
      </div>
      <div class="setup-row">
        <label for="pair-select">Paire de personnages</label>
        <select id="pair-select"><option value="random">Aleatoire</option></select>
      </div>
      <div id="player-names-area" style="margin-top:20px;"></div>
      <div class="btn-center">
        <button class="btn btn-primary" onclick="generatePlayerInputs()">Configurer les joueurs</button>
      </div>
    </div>
  </div>

  <!-- ════ GAME SCREEN ════ -->
  <div id="game-screen" class="hidden">
    <div class="game-header">
      <span class="round-badge" id="round-badge">Tour 1</span>
      <span class="phase-label" id="phase-label">Distribution des roles</span>
      <button class="btn btn-secondary" onclick="resetGame()">Nouvelle partie</button>
    </div>

    <div class="instructions" id="instructions"></div>
    <div class="players-grid" id="players-grid"></div>
    <div id="action-area"></div>
  </div>
</div>

// ── Setup ──
function init() {
  const sel = document.getElementById('pair-select');
  PAIRS.forEach((p, i) => {
    const opt = document.createElement('option');
    opt.value = i;
    opt.textContent = `${p.civil} vs ${p.undercover} (${p.universe})`;
    sel.appendChild(opt);
  });
}

function generatePlayerInputs() {
  const n = parseInt(document.getElementById('nb-players').value);
  const area = document.getElementById('player-names-area');
  area.innerHTML = '<h3 style="margin-bottom:12px;color:#aaa;font-size:0.95rem;">Noms des joueurs</h3>';
  for (let i = 0; i < n; i++) {
    const row = document.createElement('div');
    row.className = 'setup-row';
    row.innerHTML = `<label>Joueur ${i+1}</label><input type="text" class="player-name-input" value="Joueur ${i+1}" placeholder="Nom...">`;
    area.appendChild(row);
  }
  const btnRow = document.createElement('div');
  btnRow.className = 'btn-center';
  btnRow.innerHTML = '<button class="btn btn-primary" onclick="startGame()">Lancer la partie</button>';
  area.appendChild(btnRow);
}

function startGame() {
  const names = [...document.querySelectorAll('.player-name-input')].map(el => el.value.trim() || 'Joueur');
  const nbUC = Math.min(parseInt(document.getElementById('nb-undercover').value), names.length - 2);
  const nbMW = Math.min(parseInt(document.getElementById('nb-mrwhite').value), names.length - nbUC - 1);
  const pairIdx = document.getElementById('pair-select').value;

  let pair;
  if (pairIdx === 'random') {
    pair = PAIRS[Math.floor(Math.random() * PAIRS.length)];
  } else {
    pair = PAIRS[parseInt(pairIdx)];
  }

  // Assign roles
  const roles = [];
  for (let i = 0; i < nbUC; i++) roles.push('undercover');
  for (let i = 0; i < nbMW; i++) roles.push('mrwhite');
  while (roles.length < names.length) roles.push('civil');

  // Shuffle roles
  for (let i = roles.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [roles[i], roles[j]] = [roles[j], roles[i]];
  }

  state.pair = pair;
  state.round = 1;
  state.players = names.map((name, i) => ({
    name,
    role: roles[i],
    character: roles[i] === 'civil' ? pair.civil : roles[i] === 'undercover' ? pair.undercover : '???',
    charImg: roles[i] === 'civil' ? pair.civilImg : roles[i] === 'undercover' ? pair.undercoverImg : '',
    universe: pair.universe,
    eliminated: false,
    voted: false,
  }));
  state.phase = 'reveal';
  state.revealIndex = 0;

  document.getElementById('setup-screen').classList.add('hidden');
  document.getElementById('game-screen').classList.remove('hidden');
  renderGame();
}

// ── Render ──
function renderGame() {
  document.getElementById('round-badge').textContent = `Tour ${state.round}`;
  const grid = document.getElementById('players-grid');
  const action = document.getElementById('action-area');
  const instr = document.getElementById('instructions');

  // Render player cards
  grid.innerHTML = '';
  state.players.forEach((p, i) => {
    const card = document.createElement('div');
    card.className = `player-card${p.eliminated ? ' eliminated' : ''}`;
    card.dataset.index = i;

    let roleTag = '';
    if (p.eliminated) {
      const rc = p.role === 'civil' ? 'role-civil' : p.role === 'undercover' ? 'role-undercover' : 'role-mrwhite';
      const rl = p.role === 'civil' ? 'Civil' : p.role === 'undercover' ? 'Undercover' : 'Mr. White';
      roleTag = `<span class="role-tag ${rc}">${rl}</span>`;
    }

    const avatarContent = p.charImg && !p.eliminated ?
      `<div class="avatar" style="background:#222;"><div style="width:100%;height:100%;background:#333;display:flex;align-items:center;justify-content:center;font-size:1.5rem;color:#555;">?</div></div>` :
      p.charImg && p.eliminated ?
      `<div class="avatar"><img src="${p.charImg}" alt="${p.character}"></div>` :
      `<div class="avatar" style="background:#222;display:flex;align-items:center;justify-content:center;font-size:1.5rem;color:#555;border-radius:50%;">?</div>`;

    card.innerHTML = `${avatarContent}<div class="pname">${p.name}</div>${roleTag}`;
    grid.appendChild(card);
  });

  // Phase-specific UI
  if (state.phase === 'reveal') {
    renderRevealPhase(instr, action, grid);
  } else if (state.phase === 'discuss') {
    renderDiscussPhase(instr, action);
  } else if (state.phase === 'vote') {
    renderVotePhase(instr, action, grid);
  }
}

function renderRevealPhase(instr, action, grid) {
  const alive = state.players.filter(p => !p.eliminated);
  if (state.revealIndex < alive.length) {
    const p = alive[state.revealIndex];
    document.getElementById('phase-label').textContent = 'Distribution des r\u00f4les';
    instr.innerHTML = `<strong>${p.name}</strong>, clique sur ton nom pour d\u00e9couvrir ton r\u00f4le en secret.`;
    action.innerHTML = '';

    // Make player cards clickable for reveal
    grid.querySelectorAll('.player-card').forEach(card => {
      const idx = parseInt(card.dataset.index);
      const player = state.players[idx];
      if (player === p) {
        card.classList.add('selected');
        card.onclick = () => showRoleReveal(idx);
      } else {
        card.onclick = null;
      }
    });
  } else {
    state.phase = 'discuss';
    renderGame();
  }
}

function showRoleReveal(playerIdx) {
  const p = state.players[playerIdx];
  const overlays = document.getElementById('overlays');

  let content = '';
  if (p.role === 'mrwhite') {
    content = `
      <div class="player-label">${p.name}</div>
      <div style="font-size:3rem;margin:20px 0;">&#x1f47b;</div>
      <div class="char-name" style="color:#f1c40f;">Mr. White</div>
      <p style="color:#888;margin:10px 0;font-size:0.9rem;">Tu ne connais pas le personnage.<br>Essaie de deviner et de te fondre dans la masse !</p>
    `;
  } else {
    content = `
      <div class="player-label">${p.name}, tu es :</div>
      <div class="char-img"><img src="${p.charImg}" alt="${p.character}"></div>
      <div class="char-name" style="color:${p.role === 'civil' ? '#2ecc71' : '#e74c3c'};">${p.character}</div>
      <div class="universe-tag">${p.universe}</div>
      <span class="role-tag ${p.role === 'civil' ? 'role-civil' : 'role-undercover'}">${p.role === 'civil' ? 'Civil' : 'Undercover'}</span>
    `;
  }

  overlays.innerHTML = `
    <div class="role-reveal" onclick="closeReveal()">
      <div class="role-card" onclick="event.stopPropagation()">
        ${content}
        <div style="margin-top:20px;">
          <button class="btn btn-secondary" onclick="closeReveal()">J&rsquo;ai compris</button>
        </div>
      </div>
    </div>
  `;

  state.revealIndex++;
}

function closeReveal() {
  document.getElementById('overlays').innerHTML = '';
  renderGame();
}

function renderDiscussPhase(instr, action) {
  document.getElementById('phase-label').textContent = 'Phase de discussion';
  instr.innerHTML = `<strong>Tour ${state.round}</strong> &mdash; Chaque joueur doit donner un indice sur son personnage. D\u00e9crivez-le sans le nommer directement !<br>
  <em>Les Civils decrivent leur personnage, l&rsquo;Undercover d\u00e9crit le sien (different !), et Mr. White improvise.</em>`;
  action.innerHTML = `<div class="btn-center">
    <button class="btn btn-primary" onclick="startVote()">Passer au vote</button>
  </div>`;
}

function startVote() {
  state.phase = 'vote';
  state.votes = {};
  state.votedPlayers = new Set();
  state.players.forEach((p, i) => {
    if (!p.eliminated) state.votes[i] = 0;
  });
  renderGame();
}

function renderVotePhase(instr, action, grid) {
  document.getElementById('phase-label').textContent = 'Phase de vote';
  const alive = state.players.filter(p => !p.eliminated);
  const aliveWithIdx = state.players.map((p, i) => ({...p, idx: i})).filter(p => !p.eliminated);
  const totalVoters = alive.length;
  const votesIn = state.votedPlayers.size;
  const currentVoter = aliveWithIdx.find(p => !state.votedPlayers.has(p.idx));

  instr.innerHTML = `<strong>Votez !</strong> (${votesIn}/${totalVoters} votes)`;

  // Show who is voting
  let voterHTML = '';
  if (currentVoter && votesIn < totalVoters) {
    voterHTML = `<div class="voter-indicator">C'est au tour de <strong>${currentVoter.name}</strong> de voter &mdash; clique sur le joueur suspect</div>`;
  }

  // Handle clicking on player cards for voting
  grid.querySelectorAll('.player-card').forEach(card => {
    const idx = parseInt(card.dataset.index);
    const player = state.players[idx];
    card.classList.remove('voting-highlight');
    if (!player.eliminated) {
      card.onclick = () => showVoteFor(idx);
      if (currentVoter && currentVoter.idx === idx) {
        card.classList.add('voting-highlight');
      }
    } else {
      card.onclick = null;
    }
  });

  // Show current votes
  let voteHTML = voterHTML + '<div class="vote-area"><h3>R\u00e9sultats du vote</h3><div class="vote-results">';
  const maxVotes = Math.max(1, ...Object.values(state.votes));
  state.players.forEach((p, i) => {
    if (!p.eliminated) {
      const count = state.votes[i] || 0;
      const pct = (count / maxVotes) * 100;
      voteHTML += `<div class="vote-bar-row">
        <span class="vname">${p.name}</span>
        <div class="vote-bar"><div class="vote-bar-fill" style="width:${pct}%"></div></div>
        <span class="vote-bar-count">${count}</span>
      </div>`;
    }
  });
  voteHTML += '</div></div>';

  if (votesIn >= totalVoters) {
    voteHTML += `<div class="btn-center">
      <button class="btn btn-danger" onclick="resolveVote()">\u00c9liminer le suspect</button>
    </div>`;
  }

  action.innerHTML = voteHTML;
}

function showVoteFor(targetIdx) {
  // Each alive player votes in order
  const alive = state.players.map((p, i) => ({...p, idx: i})).filter(p => !p.eliminated);
  const voter = alive.find(p => !state.votedPlayers.has(p.idx));
  if (!voter) return;

  if (voter.idx === targetIdx) {
    // Can't vote for yourself
    return;
  }

  state.votes[targetIdx] = (state.votes[targetIdx] || 0) + 1;
  state.votedPlayers.add(voter.idx);
  renderGame();
}

function resolveVote() {
  // Find player with most votes
  let maxVotes = 0, eliminatedIdx = -1;
  Object.entries(state.votes).forEach(([idx, count]) => {
    if (count > maxVotes) {
      maxVotes = count;
      eliminatedIdx = parseInt(idx);
    }
  });

  // Check tie
  const tiedPlayers = Object.entries(state.votes).filter(([_, count]) => count === maxVotes);
  if (tiedPlayers.length > 1) {
    // Random among tied
    const pick = tiedPlayers[Math.floor(Math.random() * tiedPlayers.length)];
    eliminatedIdx = parseInt(pick[0]);
  }

  const eliminated = state.players[eliminatedIdx];
  eliminated.eliminated = true;

  // Check if eliminated is Mr. White -> guess phase
  if (eliminated.role === 'mrwhite') {
    showMrWhiteGuess(eliminatedIdx);
    return;
  }

  // Show elimination transition
  showEliminationBanner(eliminatedIdx);
}

function showEliminationBanner(playerIdx) {
  const p = state.players[playerIdx];
  const roleLabel = p.role === 'civil' ? 'Civil' : p.role === 'undercover' ? 'Undercover' : 'Mr. White';
  const roleClass = p.role === 'civil' ? 'role-civil' : p.role === 'undercover' ? 'role-undercover' : 'role-mrwhite';
  const overlays = document.getElementById('overlays');

  const avatarHTML = p.charImg ?
    `<div class="elim-avatar"><img src="${p.charImg}" alt="${p.character}"></div>` :
    `<div class="elim-avatar" style="background:#333;display:flex;align-items:center;justify-content:center;font-size:2rem;color:#666;">?</div>`;

  overlays.innerHTML = `
    <div class="role-reveal" onclick="closeEliminationAndContinue()">
      <div class="role-card" onclick="event.stopPropagation()">
        <div class="player-label" style="color:#e74c3c;font-size:1.1rem;font-weight:600;">\u00c9limin\u00e9(e) !</div>
        ${avatarHTML}
        <div class="char-name" style="color:#e74c3c;">${p.name}</div>
        <div style="margin:8px 0;">
          <span class="role-tag ${roleClass}">${roleLabel}</span>
        </div>
        <div style="color:#888;font-size:0.9rem;">${p.character} &mdash; ${p.universe}</div>
        <div style="margin-top:20px;">
          <button class="btn btn-primary" onclick="closeEliminationAndContinue()">Continuer</button>
        </div>
      </div>
    </div>
  `;
}

function closeEliminationAndContinue() {
  document.getElementById('overlays').innerHTML = '';
  checkWinCondition();
}

function showMrWhiteGuess(playerIdx) {
  const p = state.players[playerIdx];
  const overlays = document.getElementById('overlays');
  overlays.innerHTML = `
    <div class="guess-overlay">
      <div class="guess-box">
        <h2 style="color:#f1c40f;">Mr. White d\u00e9masqu\u00e9 !</h2>
        <p style="color:#aaa;margin:10px 0;">${p.name}, tu peux tenter de deviner le personnage des Civils pour gagner !</p>
        <input type="text" id="mrwhite-guess" placeholder="Ton personnage...">
        <div class="btn-center">
          <button class="btn btn-success" onclick="submitMrWhiteGuess()">Deviner</button>
          <button class="btn btn-secondary" onclick="skipMrWhiteGuess()">Passer</button>
        </div>
      </div>
    </div>
  `;
}

function submitMrWhiteGuess() {
  const guess = document.getElementById('mrwhite-guess').value.trim().toLowerCase();
  const target = state.pair.civil.toLowerCase();
  document.getElementById('overlays').innerHTML = '';

  if (guess === target) {
    showResult('mrwhite', 'Mr. White a devin\u00e9 le personnage civil !');
  } else {
    checkWinCondition();
  }
}

function skipMrWhiteGuess() {
  document.getElementById('overlays').innerHTML = '';
  checkWinCondition();
}

function checkWinCondition() {
  const alive = state.players.filter(p => !p.eliminated);
  const civils = alive.filter(p => p.role === 'civil');
  const undercovers = alive.filter(p => p.role === 'undercover');
  const mrwhites = alive.filter(p => p.role === 'mrwhite');

  // Undercover wins if they are in majority or equal
  if (undercovers.length >= civils.length && undercovers.length > 0) {
    showResult('undercover', 'Les Undercover ont infiltr\u00e9 le groupe !');
    return;
  }

  // All undercovers and mr whites eliminated -> civils win
  if (undercovers.length === 0 && mrwhites.length === 0) {
    showResult('civil', 'Les Civils ont d\u00e9masqu\u00e9 tous les intrus !');
    return;
  }

  // Continue game
  state.round++;
  state.phase = 'discuss';
  renderGame();
}

function showResult(winner, message) {
  const overlays = document.getElementById('overlays');
  const colorClass = winner === 'civil' ? 'winner-civil' : winner === 'undercover' ? 'winner-undercover' : 'winner-mrwhite';

  let pairHTML = `
    <div class="pair-reveal">
      <div class="pair-char">
        <img src="${state.pair.civilImg}" alt="${state.pair.civil}">
        <div class="pc-name">${state.pair.civil}</div>
        <div class="pc-role">Civil</div>
      </div>
      <div style="display:flex;align-items:center;font-size:1.5rem;color:#555;">VS</div>
      <div class="pair-char">
        <img src="${state.pair.undercoverImg}" alt="${state.pair.undercover}">
        <div class="pc-name">${state.pair.undercover}</div>
        <div class="pc-role">Undercover</div>
      </div>
    </div>
  `;

  let rolesHTML = '<div style="margin:15px 0;text-align:left;">';
  state.players.forEach(p => {
    const icon = p.role === 'civil' ? '&#x1f7e2;' : p.role === 'undercover' ? '&#x1f534;' : '&#x26aa;';
    rolesHTML += `<div style="padding:4px 0;font-size:0.9rem;">${icon} <strong>${p.name}</strong> &mdash; ${p.character} (${p.role})</div>`;
  });
  rolesHTML += '</div>';

  overlays.innerHTML = `
    <div class="result-overlay">
      <div class="result-box">
        <h2 class="${colorClass}">${winner === 'civil' ? 'Victoire des Civils !' : winner === 'undercover' ? 'Victoire Undercover !' : 'Mr. White gagne !'}</h2>
        <p style="color:#aaa;margin:10px 0;">${message}</p>
        ${pairHTML}
        ${rolesHTML}
        <div class="btn-center">
          <button class="btn btn-primary" onclick="resetGame()">Nouvelle partie</button>
        </div>
      </div>
    </div>
  `;
}

function resetGame() {
  document.getElementById('overlays').innerHTML = '';
  document.getElementById('game-screen').classList.add('hidden');
  document.getElementById('setup-screen').classList.remove('hidden');
  state = {
    players: [], pair: null, round: 1, phase: 'setup',
    revealIndex: 0, votes: {}, votedPlayers: new Set(),
  };
}

// ── Init ──
init();
</script>
</body>
</html>
